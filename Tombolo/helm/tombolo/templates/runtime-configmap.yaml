apiVersion: v1
kind: ConfigMap
metadata:
  name: tombolo-runtime-config
  namespace: {{ include "tombolo.namespace" . }}
data:
  DB_HOSTNAME: {{ .Values.runtime.config.DB_HOSTNAME | quote }}
  DB_PORT: {{ .Values.runtime.config.DB_PORT | quote }}
  DB_NAME: {{ .Values.runtime.config.DB_NAME | quote }}
  REDIS_DB: {{ .Values.runtime.config.REDIS_DB | quote }}
  REDIS_HOST: {{ (.Values.runtime.config.REDIS_HOST | default "tombolo-redis") | quote }}
  REDIS_PORT: {{ (.Values.runtime.config.REDIS_PORT | default (printf "%v" .Values.redis.service.port)) | quote }}
